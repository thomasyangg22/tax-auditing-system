<svg width="680" viewBox="0 0 680 625" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff; font-family: Arial, sans-serif;">
  <title>UML Class Diagram — Tax Auditing System</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- TaxAuditSystem -->
  <rect x="20" y="20" width="640" height="262" rx="4" fill="#f5f5f5" stroke="#aaa" stroke-width="0.5"/>
  <rect x="20" y="20" width="640" height="32" rx="4" fill="#534AB7" stroke="#534AB7" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#EEEDFE" x="340" y="36" text-anchor="middle" dominant-baseline="central">TaxAuditSystem</text>
  <line x1="20" y1="52" x2="660" y2="52" stroke="#aaa" stroke-width="0.5"/>
  <line x1="20" y1="122" x2="660" y2="122" stroke="#aaa" stroke-width="0.5"/>
  <text font-size="12" fill="#444" x="28" y="69"  dominant-baseline="central">- taxpayers : ArrayList&lt;Taxpayer&gt;</text>
  <text font-size="12" fill="#444" x="28" y="87"  dominant-baseline="central">- taxRecords : ArrayList&lt;TaxRecord&gt;</text>
  <text font-size="12" fill="#444" x="28" y="105" dominant-baseline="central">- auditLogs : ArrayList&lt;AuditLog&gt;</text>
  <text font-size="12" fill="#444" x="28" y="139" dominant-baseline="central">+ main(args : String[]) : void</text>
  <text font-size="12" fill="#444" x="28" y="157" dominant-baseline="central">+ addTaxpayer() : void</text>
  <text font-size="12" fill="#444" x="28" y="175" dominant-baseline="central">+ viewAllTaxpayers() : void</text>
  <text font-size="12" fill="#444" x="28" y="193" dominant-baseline="central">+ addTaxRecord() : void</text>
  <text font-size="12" fill="#444" x="28" y="211" dominant-baseline="central">+ viewTaxRecords() : void</text>
  <text font-size="12" fill="#444" x="28" y="229" dominant-baseline="central">+ runAudit() : void</text>
  <text font-size="12" fill="#444" x="28" y="247" dominant-baseline="central">+ viewAuditLogs() : void</text>
  <text font-size="12" fill="#444" x="28" y="265" dominant-baseline="central">- calculateExpectedTax(income : double) : double</text>

  <!-- Arrows -->
  <line x1="115" y1="282" x2="115" y2="332" stroke="#555" stroke-width="0.5" marker-end="url(#arrow)"/>
  <text font-size="12" fill="#444" x="122" y="292" dominant-baseline="central">1</text>
  <text font-size="12" fill="#444" x="122" y="322" dominant-baseline="central">0..*</text>
  <line x1="330" y1="282" x2="330" y2="332" stroke="#555" stroke-width="0.5" marker-end="url(#arrow)"/>
  <text font-size="12" fill="#444" x="337" y="292" dominant-baseline="central">1</text>
  <text font-size="12" fill="#444" x="337" y="322" dominant-baseline="central">0..*</text>
  <line x1="555" y1="282" x2="555" y2="332" stroke="#555" stroke-width="0.5" marker-end="url(#arrow)"/>
  <text font-size="12" fill="#444" x="562" y="292" dominant-baseline="central">1</text>
  <text font-size="12" fill="#444" x="562" y="322" dominant-baseline="central">0..*</text>

  <!-- Taxpayer -->
  <rect x="20" y="332" width="190" height="244" rx="4" fill="#f5f5f5" stroke="#aaa" stroke-width="0.5"/>
  <rect x="20" y="332" width="190" height="32" rx="4" fill="#185FA5" stroke="#185FA5" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#E6F1FB" x="115" y="348" text-anchor="middle" dominant-baseline="central">Taxpayer</text>
  <line x1="20" y1="364" x2="210" y2="364" stroke="#aaa" stroke-width="0.5"/>
  <line x1="20" y1="452" x2="210" y2="452" stroke="#aaa" stroke-width="0.5"/>
  <text font-size="12" fill="#444" x="28" y="381" dominant-baseline="central">- taxpayerID : String</text>
  <text font-size="12" fill="#444" x="28" y="399" dominant-baseline="central">- name : String</text>
  <text font-size="12" fill="#444" x="28" y="417" dominant-baseline="central">- address : String</text>
  <text font-size="12" fill="#444" x="28" y="435" dominant-baseline="central">- phoneNumber : String</text>
  <text font-size="12" fill="#444" x="28" y="469" dominant-baseline="central">+ getTaxpayerID() : String</text>
  <text font-size="12" fill="#444" x="28" y="487" dominant-baseline="central">+ getName() : String</text>
  <text font-size="12" fill="#444" x="28" y="505" dominant-baseline="central">+ setName() : void</text>
  <text font-size="12" fill="#444" x="28" y="523" dominant-baseline="central">+ setAddress() : void</text>
  <text font-size="12" fill="#444" x="28" y="541" dominant-baseline="central">+ getPhoneNumber() : String</text>
  <text font-size="12" fill="#444" x="28" y="559" dominant-baseline="central">+ toString() : String</text>

  <!-- TaxRecord -->
  <rect x="235" y="332" width="190" height="226" rx="4" fill="#f5f5f5" stroke="#aaa" stroke-width="0.5"/>
  <rect x="235" y="332" width="190" height="32" rx="4" fill="#0F6E56" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#E1F5EE" x="330" y="348" text-anchor="middle" dominant-baseline="central">TaxRecord</text>
  <line x1="235" y1="364" x2="425" y2="364" stroke="#aaa" stroke-width="0.5"/>
  <line x1="235" y1="452" x2="425" y2="452" stroke="#aaa" stroke-width="0.5"/>
  <text font-size="12" fill="#444" x="243" y="381" dominant-baseline="central">- taxpayerID : String</text>
  <text font-size="12" fill="#444" x="243" y="399" dominant-baseline="central">- year : int</text>
  <text font-size="12" fill="#444" x="243" y="417" dominant-baseline="central">- income : double</text>
  <text font-size="12" fill="#444" x="243" y="435" dominant-baseline="central">- taxesPaid : double</text>
  <text font-size="12" fill="#444" x="243" y="469" dominant-baseline="central">+ getTaxpayerID() : String</text>
  <text font-size="12" fill="#444" x="243" y="487" dominant-baseline="central">+ getYear() : int</text>
  <text font-size="12" fill="#444" x="243" y="505" dominant-baseline="central">+ getIncome() : double</text>
  <text font-size="12" fill="#444" x="243" y="523" dominant-baseline="central">+ getTaxesPaid() : double</text>
  <text font-size="12" fill="#444" x="243" y="541" dominant-baseline="central">+ toString() : String</text>

  <!-- AuditLog -->
  <rect x="450" y="332" width="210" height="262" rx="4" fill="#f5f5f5" stroke="#aaa" stroke-width="0.5"/>
  <rect x="450" y="332" width="210" height="32" rx="4" fill="#BA7517" stroke="#BA7517" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#FAEEDA" x="555" y="348" text-anchor="middle" dominant-baseline="central">AuditLog</text>
  <line x1="450" y1="364" x2="660" y2="364" stroke="#aaa" stroke-width="0.5"/>
  <line x1="450" y1="524" x2="660" y2="524" stroke="#aaa" stroke-width="0.5"/>
  <text font-size="12" fill="#444" x="458" y="381" dominant-baseline="central">- taxpayerID : String</text>
  <text font-size="12" fill="#444" x="458" y="399" dominant-baseline="central">- year : int</text>
  <text font-size="12" fill="#444" x="458" y="417" dominant-baseline="central">- income : double</text>
  <text font-size="12" fill="#444" x="458" y="435" dominant-baseline="central">- taxesPaid : double</text>
  <text font-size="12" fill="#444" x="458" y="453" dominant-baseline="central">- expectedTax : double</text>
  <text font-size="12" fill="#444" x="458" y="471" dominant-baseline="central">- discrepancy : double</text>
  <text font-size="12" fill="#444" x="458" y="489" dominant-baseline="central">- status : String</text>
  <text font-size="12" fill="#444" x="458" y="507" dominant-baseline="central">- auditDate : String</text>
  <text font-size="12" fill="#444" x="458" y="541" dominant-baseline="central">+ getTaxpayerID() : String</text>
  <text font-size="12" fill="#444" x="458" y="559" dominant-baseline="central">+ getStatus() : String</text>
  <text font-size="12" fill="#444" x="458" y="577" dominant-baseline="central">+ toString() : String</text>
</svg>
